name: Deploy DevOps Monitor

on:
  push:
    branches:
      - main

jobs:
  # ── JOB 1: TEST ──
  test:
    name: Test the app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Check app starts correctly
        working-directory: ./app
        run: |
          node server.js &
          sleep 3
          curl http://localhost:3000/health
          kill %1

  # ── JOB 2: TERRAFORM ──
  infrastructure:
    name: Provision AWS infrastructure
    runs-on: ubuntu-latest
    needs: test      # only runs if test passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan
        env:
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
          TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
          TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── JOB 3: DEPLOY ──
  deploy:
    name: Deploy app to EC2
    runs-on: ubuntu-latest
    needs: infrastructure    # only runs after infrastructure is ready
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

# Fix folder permissions before copying files
      - name: Fix EC2 folder permissions
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /home/ubuntu/devops-monitor
            sudo chown -R ubuntu:ubuntu /home/ubuntu/devops-monitor
            sudo chmod -R 755 /home/ubuntu/devops-monitor

      -- name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/devops-monitor"
      -- name: Deploy with Docker Compose
         uses: appleboy/ssh-action@v1.0.0
         with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Fix permissions on the folder
            sudo mkdir -p /home/ubuntu/devops-monitor
            sudo chown -R ubuntu:ubuntu /home/ubuntu/devops-monitor
            sudo chmod -R 755 /home/ubuntu/devops-monitor
            # Set Slack webhook URL
            export SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}"

            # Stop existing containers
            docker-compose down

            # Rebuild and start all containers
            docker-compose up -d --build

            # Show status
            docker-compose ps

            echo "✅ Deployment complete!"

      # Send Slack notification when deployment succeeds
      - name: Notify Slack — Deploy Success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "✅ *Deployment Successful!*\n*Project:* DevOps Monitor\n*Branch:* main\n*Deployed by:* ${{ github.actor }}\n*App URL:* http://${{ secrets.EC2_HOST }}:3000\n*Grafana:* http://${{ secrets.EC2_HOST }}:3001"
          }'

      # Send Slack notification when deployment fails
      - name: Notify Slack — Deploy Failed
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "🚨 *Deployment FAILED!*\n*Project:* DevOps Monitor\n*Branch:* main\n*Triggered by:* ${{ github.actor }}\n*Check GitHub Actions for details.*"
          }'
