name: Deploy DevOps Monitor

on:
  push:
    branches:
      - main

jobs:
  # ── JOB 1: TEST ──
  test:
    name: Test the app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Check app starts correctly
        working-directory: ./app
        run: |
          node server.js &
          sleep 3
          curl http://localhost:3000/health
          kill %1

  # ── JOB 2: TERRAFORM ──
  infrastructure:
    name: Provision AWS infrastructure
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -var="key_name=${{ secrets.EC2_KEY_NAME }}" -var="slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -var="key_name=${{ secrets.EC2_KEY_NAME }}" -var="slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL }}"

  # ── JOB 3: DEPLOY ──
  deploy:
    name: Deploy app to EC2
    runs-on: ubuntu-latest
    needs: infrastructure
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix EC2 folder permissions
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /home/ubuntu/devops-monitor
            sudo chown -R ubuntu:ubuntu /home/ubuntu/devops-monitor
            sudo chmod -R 755 /home/ubuntu/devops-monitor

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/devops-monitor"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/devops-monitor
            export SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}"
            docker-compose down
            docker-compose up -d --build
            docker-compose ps
            echo "✅ Deployment complete!"

      - name: Notify Slack success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{"text":"✅ *Deployment Successful!*\n*Project:* DevOps Monitor\n*Deployed by:* ${{ github.actor }}"}'

      - name: Notify Slack failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{"text":"🚨 *Deployment FAILED!*\n*Project:* DevOps Monitor\n*Triggered by:* ${{ github.actor }}"}'